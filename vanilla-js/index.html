<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script type="module" src="assets/js/main.js" defer></script>
    <title>My Wallet</title>
  </head>
  <body>
    <div class="toast hidden">Erro ao carregar a lista</div>
    <div class="container">
      <header>
        <h1>
          <svg
            width="24px"
            height="24px"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            stroke="#fff"
          >
            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
            <g
              id="SVGRepo_tracerCarrier"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></g>
            <g id="SVGRepo_iconCarrier">
              <path
                d="M20 15C20.5523 15 21 14.5523 21 14C21 13.4477 20.5523 13 20 13C19.4477 13 19 13.4477 19 14C19 14.5523 19.4477 15 20 15Z"
                fill="#fff"
              ></path>
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M16.775 0.985398C18.4919 0.460783 20.2821 1.55148 20.6033 3.3178L20.9362 5.14896C22.1346 5.54225 23 6.67006 23 8V10.7639C23.6137 11.3132 24 12.1115 24 13V15C24 15.8885 23.6137 16.6868 23 17.2361V20C23 21.6569 21.6569 23 20 23H4C2.34315 23 1 21.6569 1 20V8C1 6.51309 2.08174 5.27884 3.50118 5.04128L16.775 0.985398ZM21 16C21.5523 16 22 15.5523 22 15V13C22 12.4477 21.5523 12 21 12H18C17.4477 12 17 12.4477 17 13V15C17 15.5523 17.4477 16 18 16H21ZM21 18V20C21 20.5523 20.5523 21 20 21H4C3.44772 21 3 20.5523 3 20V8C3 7.44772 3.44772 7 4 7H20C20.55 7 20.9962 7.44396 21 7.99303L21 10H18C16.3431 10 15 11.3431 15 13V15C15 16.6569 16.3431 18 18 18H21ZM18.6954 3.60705L18.9412 5H10L17.4232 2.82301C17.9965 2.65104 18.5914 3.01769 18.6954 3.60705Z"
                fill="#fff"
              ></path>
            </g>
          </svg>
          <a href="/index.html"> .Wallet </a>
        </h1>
        <p>Organize suas finanças com my wallet.</p>
        <div class="balance-info">
          <div class="info entry-balance">
            <span id="entry-balance">Entrada: R$ 0,00</span>
          </div>
          <div class="info exit-balance">
            <span id="exit-balance">Saída: R$ 0,00</span>
          </div>
          <div class="info final-balance">
            <span id="final-balance">Saldo: R$ 0,00</span>
          </div>
        </div>
      </header>
      <main>
        <div class="add-transaction">
          <form id="transactionForm" class="transactionForm">
            <div class="form-label">
              <div class="label-group">
                <label for="transactionName">Nome:</label>
                <input
                  name="transactionName"
                  id="transactionName"
                  type="text"
                  placeholder="Nome da transação..."
                />
              </div>
            </div>
            <div class="form-label">
              <div class="label-group">
                <label for="transactionValue">Valor:</label>
                <input
                  name="transactionValue"
                  id="transactionValue"
                  type="text"
                  placeholder="R$ 0,00"
                />
              </div>
            </div>

            <div class="form-label">
              <div class="label-group">
                <label for="transactionValue">Categoria:</label>
                <select name="transactionCategory" id="transactionCategory">
                  <option value="">Selecione a categoria</option>
                  <option value="entry">Entrada</option>
                  <option value="exit">Saída</option>
                </select>
              </div>
            </div>
            <button class="submitBtn">Enviar</button>
          </form>
          <button class="reset-form">Limpar formulário</button>
        </div>
        <div class="transactions-list">
          <div class="top">
            <div class="filters">
              <span>Filtros:</span>
              <select name="filter" id="filter">
                <option value="all">Todos</option>
                <option value="entry">Entrada</option>
                <option value="exit">Saída</option>
              </select>
            </div>
            <div class="order">
              <span>Ordenar:</span>
              <select name="order" id="order">
                <option value="lastIn">Mais recente</option>
                <option value="firstIn">Mais antigo</option>
                <option value="bigger">Maior valor</option>
                <option value="smaller">Menor valor</option>
              </select>
            </div>
          </div>
          <div class="transactions">
            <span class="loader">Carregando...</span>
          </div>
        </div>
      </main>
      <div class="confirmation-modal hidden">
      </div>
    </div>
  </body>
</html>
