services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - APP_ENV=${APP_ENV}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
    depends_on:
      - db
  
  db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}